name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: stripe-provider

      - uses: actions/checkout@v4
        with:
          repository: payroad/payroad-core
          path: payroad-core

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath
          coverage: none

      - name: Install dependencies
        working-directory: stripe-provider
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests
        working-directory: stripe-provider
        run: vendor/bin/phpunit
